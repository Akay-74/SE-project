name: Selenium Login Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Install dependencies
        run: pip install -r tests/selenium/requirements.txt

      - name: Run Selenium login tests
        env:
          BASE_URL:        ${{ secrets.BASE_URL }}
          VALID_EMAIL:     ${{ secrets.VALID_EMAIL }}
          VALID_PASSWORD:  ${{ secrets.VALID_PASSWORD }}
          INVALID_EMAIL:   ${{ secrets.INVALID_EMAIL }}
          INVALID_PASS:    ${{ secrets.INVALID_PASS }}
          HEADLESS:        "true"
        run: |
          cd tests/selenium
          pytest test_login.py -v --html=report.html --self-contained-html

      - name: Upload HTML test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: selenium-test-report
          path: tests/selenium/report.html
